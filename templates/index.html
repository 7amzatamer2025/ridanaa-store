<!DOCTYPE html>
<html lang="ar" dir="rtl" id="main-html">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ridanaa | رِدانا</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&family=Playfair+Display:italic,wght@1,700&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #2B0508; --gold: #d4b483; --white: #fcfaf7; --card: #3D0A11; }
        body { font-family: 'Cairo', sans-serif; background: var(--bg); color: var(--white); margin: 0; overflow-x: hidden; transition: 0.5s; }

        /* --- أنيميشن اللودر --- */
        #loader {
            position: fixed; inset: 0; background: #1a0204; z-index: 9999;
            display: flex; justify-content: center; align-items: center;
            transition: opacity 1s ease, visibility 1s;
        }
        .loader-content { text-align: center; }
        .logo-anim {
            font-family: 'Playfair Display', serif; font-size: 4rem; color: var(--gold);
            margin: 0; animation: breath 3s ease-in-out infinite; letter-spacing: 10px;
        }
        .line-loader { width: 0; height: 2px; background: var(--gold); margin: 10px auto; animation: fillLine 2s forwards; }
        @keyframes breath {
            0%, 100% { opacity: 0.5; transform: scale(0.95); filter: blur(2px); }
            50% { opacity: 1; transform: scale(1); filter: blur(0px); }
        }
        @keyframes fillLine { from { width: 0; } to { width: 100%; } }
        .loader-hidden { opacity: 0; visibility: hidden; }

        .p-card { 
            background: var(--card); border-radius: 20px; overflow: hidden; border: 1px solid rgba(212,180,131,0.1);
            opacity: 0; transform: translateY(30px); transition: 0.6s; cursor: pointer;
        }
        .p-card.show { opacity: 1; transform: translateY(0); }
        .p-card:hover { box-shadow: 0 0 25px var(--gold); transform: scale(1.02); }

        .hero { text-align:center; padding:100px 20px; }
        .hero h1 { font-family:'Playfair Display'; font-size:3.5rem; color:var(--gold); }

        #cart-fab { position:fixed; bottom:30px; right:30px; background:var(--gold); color:var(--bg); width:65px; height:65px; border-radius:50%; display:flex; justify-content:center; align-items:center; font-size:1.8rem; cursor:pointer; z-index:5000; box-shadow: 0 5px 20px rgba(0,0,0,0.5); }

        .overlay { position:fixed; inset:0; background:rgba(26,2,4,0.98); z-index:6000; display:none; padding:20px; overflow-y:auto; backdrop-filter: blur(10px); animation: fadeIn 0.3s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .btn-gold { background:var(--gold); color:var(--bg); border:none; padding:15px; border-radius:50px; width:100%; font-weight:bold; cursor:pointer; margin-top:15px; }
        input, textarea { width:100%; padding:15px; margin:10px 0; background:#3D0A11; border:1px solid var(--gold); color:white; border-radius:10px; font-family: 'Cairo'; }
        
        /* تنبيه المخزون */
        .stock-alert { color: #ff4d4d; font-size: 0.8rem; font-weight: bold; display: block; margin-top: 5px; }
    </style>
</head>
<body>

    <div id="loader">
        <div class="loader-content">
            <h1 class="logo-anim">RIDANAA</h1>
            <div class="line-loader"></div>
            <p style="color:var(--gold); letter-spacing: 5px; margin-top: 10px; font-size: 0.8rem;">EST 2025</p>
        </div>
    </div>

    <nav style="display:flex; justify-content:space-between; padding:25px; position:sticky; top:0; background:rgba(43,5,8,0.9); z-index:1000;">
        <div style="font-family:'Playfair Display'; font-size:2rem; color:var(--gold)">Ridanaa</div>
        <button onclick="toggleLang()" id="lang-btn" style="background:none; border:1px solid var(--gold); color:var(--gold); padding:5px 20px; border-radius:50px; cursor:pointer">English</button>
    </nav>

    <div class="hero">
        <h1 id="hero-txt">Made For Queen 💗🦋</h1>
        <p id="sub-txt" style="opacity:0.8">نصنع الملكات بأرقى الخامات والتصاميم</p>
    </div>

    <div class="gallery" id="main-grid" style="display:grid; grid-template-columns:1fr 1fr; gap:20px; padding:20px;"></div>

    <footer style="background:#1a0204; padding:60px 20px; text-align:center; border-top:1px solid var(--gold);">
        <h2 id="about-h">عن رِدانا</h2>
        <p id="about-p" style="max-width:600px; margin:20px auto; line-height:2">رِدانا هي وجهتكِ الأولى للفخامة والحشمة. بدأنا في 2025 برؤية من "ندا" لتقديم تصاميم فريدة تجعل كل امرأة تشعر وكأنها ملكة.</p>
    </footer>

    <div id="cart-fab" onclick="openCart()">🛒<span id="cart-count" style="font-size:12px; position:absolute; top:10px; right:10px; background:white; color:black; border-radius:50%; width:20px; height:20px; display:flex; justify-content:center; align-items:center;">0</span></div>

    <div id="cart-modal" class="overlay">
        <div style="display:flex; justify-content:space-between; align-items:center">
            <h2 id="cart-title">حقيبة التسوق</h2>
            <button onclick="closeModals()" style="background:none; border:none; color:var(--gold); font-size:2.5rem; cursor:pointer">✕</button>
        </div>
        <div id="cart-items" style="margin-top:20px"></div>
        
        <div id="checkout-section" style="display:none; margin-top:20px; border-top:1px solid #444; padding-top:20px">
            <h3 id="order-info-h">بيانات الشحن:</h3>
            <input type="text" id="c-name" placeholder="الاسم بالكامل">
            <input type="text" id="c-phone" placeholder="رقم الموبايل">
            <textarea id="c-addr" placeholder="العنوان بالتفصيل"></textarea>
            <button class="btn-gold" onclick="sendOrder()">تأكيد الطلب 👑</button>
        </div>

        <div style="margin-top:40px; border-top:1px solid #444; padding-top:20px">
            <h3 id="track-h">تتبع طلباتك السابقة:</h3>
            <div style="display:flex; gap:10px">
                <input type="text" id="track-phone" placeholder="رقم الموبايل المسجل">
                <button onclick="trackOrders()" style="width:100px; background:var(--gold); border:none; border-radius:10px; cursor:pointer; color:var(--bg); font-weight:bold">بحث</button>
            </div>
            <div id="past-orders-list" style="margin-top:15px"></div>
        </div>
    </div>

    <div id="p-modal" class="overlay">
        <button onclick="closeModals()" style="background:none; border:none; color:var(--gold); font-size:2.5rem; cursor:pointer">✕</button>
        <div id="p-images" style="display:flex; overflow-x:auto; gap:10px; padding:10px"></div>
        <div style="text-align:center; padding:20px">
            <h2 id="p-title" style="color:var(--gold)"></h2>
            <p id="p-price" style="font-size:1.8rem"></p>
            <div id="p-sizes" style="margin:20px 0"></div>
            <button class="btn-gold" onclick="addToCart()">إضافة للحقيبة ✨</button>
        </div>
    </div>

    <script>
        let lang = 'ar';
        let products = {{ products_json | safe }};
        let cart = JSON.parse(localStorage.getItem('ridanaa_cart') || '[]');
        let selectedP = null, selectedS = null;

        const translations = {
            en: {
                hero: "Made For Queen 💗🦋",
                sub: "We craft luxury for queens with the finest fabrics.",
                aboutH: "About Ridanaa",
                aboutP: "Ridanaa is your premier destination for elegance and modesty. Founded in 2025 by NADA.",
                cartT: "Shopping Bag",
                trackH: "Track Your Orders:",
                orderInfo: "Shipping Information:",
                btnLang: "عربي",
                stockMsg: "Only {n} left!"
            },
            ar: {
                hero: "Made For Queen 💗🦋",
                sub: "نصنع الملكات بأرقى الخامات والتصاميم",
                aboutH: "عن رِدانا",
                aboutP: "رِدانا هي وجهتكِ الأولى للفخامة والحشمة. بدأنا في 2025 برؤية من 'ندا' لتقديم تصاميم فريدة تجعل كل امرأة تشعر وكأنها ملكة.",
                cartT: "حقيبة التسوق",
                trackH: "تتبع طلباتك السابقة:",
                orderInfo: "بيانات الشحن:",
                btnLang: "English",
                stockMsg: "قرب يخلص! فاضل {n} فقط"
            }
        };

        function init() {
            const grid = document.getElementById('main-grid');
            grid.innerHTML = products.map((p, i) => `
                <div class="p-card" id="card-${i}" onclick="viewProduct(${p.id})">
                    <img src="${p.imgs[0]}" style="width:100%; height:250px; object-fit:cover">
                    <div style="padding:15px; text-align:center; color:var(--gold); font-weight:bold">${lang=='ar'?p.nameAr:p.nameEn}</div>
                </div>
            `).join('');
            
            setTimeout(() => {
                document.querySelectorAll('.p-card').forEach((c, i) => {
                    setTimeout(() => c.classList.add('show'), i * 100);
                });
            }, 100);
            updateCartCount();
        }

        window.addEventListener('load', () => {
            setTimeout(() => {
                document.getElementById('loader').classList.add('loader-hidden');
            }, 2000);
        });

        function toggleLang() {
            lang = lang === 'ar' ? 'en' : 'ar';
            const t = translations[lang];
            document.getElementById('main-html').dir = lang === 'ar' ? 'rtl' : 'ltr';
            document.getElementById('lang-btn').innerText = t.btnLang;
            document.getElementById('hero-txt').innerText = t.hero;
            document.getElementById('sub-txt').innerText = t.sub;
            document.getElementById('about-h').innerText = t.aboutH;
            document.getElementById('about-p').innerText = t.aboutP;
            document.getElementById('cart-title').innerText = t.cartT;
            document.getElementById('track-h').innerText = t.trackH;
            document.getElementById('order-info-h').innerText = t.orderInfo;
            init();
        }

        function viewProduct(id) {
            selectedP = products.find(x => x.id === id);
            document.getElementById('p-title').innerText = lang=='ar'?selectedP.nameAr:selectedP.nameEn;
            document.getElementById('p-price').innerText = selectedP.price + " EGP";
            document.getElementById('p-images').innerHTML = selectedP.imgs.map(img => `<img src="${img}" style="height:300px; border-radius:15px">`).join('');
            
            const sBox = document.getElementById('p-sizes');
            sBox.innerHTML = Object.keys(selectedP.inventory).filter(s => selectedP.inventory[s] > 0).map(s => {
                let count = selectedP.inventory[s];
                let alertMsg = (count <= 3) ? `<span class="stock-alert">${translations[lang].stockMsg.replace('{n}', count)}</span>` : '';
                return `
                    <div style="display:inline-block; margin:5px;">
                        <button onclick="selectSize(this,'${s}')" style="padding:10px 20px; border:1px solid var(--gold); color:var(--gold); background:none; border-radius:10px; cursor:pointer">${s}</button>
                        ${alertMsg}
                    </div>
                `;
            }).join('');
            
            document.getElementById('p-modal').style.display = 'block';
            selectedS = null;
        }

        function selectSize(btn, s) {
            document.querySelectorAll('#p-sizes button').forEach(b => { b.style.background='none'; b.style.color='var(--gold)'; });
            btn.style.background = 'var(--gold)';
            btn.style.color = 'var(--bg)';
            selectedS = s;
        }

        function openCart() {
            const itemsDiv = document.getElementById('cart-items');
            itemsDiv.innerHTML = cart.length > 0 ? cart.map((i, idx) => `
                <div style="background:rgba(255,255,255,0.05); padding:15px; border-radius:10px; margin-bottom:10px; display:flex; justify-content:space-between">
                    <span>${i.name} (${i.size})</span>
                    <b onclick="removeFromCart(${idx})" style="color:red; cursor:pointer">🗑️</b>
                </div>
            `).join('') : (lang=='ar'?'السلة فارغة':'Your cart is empty');
            document.getElementById('checkout-section').style.display = cart.length > 0 ? 'block' : 'none';
            document.getElementById('cart-modal').style.display = 'block';
        }

        function addToCart() {
            if(!selectedS) return alert(lang=='ar'?'اختاري المقاس أولاً!':'Please select a size!');
            cart.push({id: selectedP.id, name: selectedP.nameAr, size: selectedS, price: selectedP.price});
            localStorage.setItem('ridanaa_cart', JSON.stringify(cart));
            updateCartCount();
            closeModals();
        }

        function removeFromCart(idx) {
            cart.splice(idx, 1);
            localStorage.setItem('ridanaa_cart', JSON.stringify(cart));
            openCart();
            updateCartCount();
        }

        async function trackOrders() {
            const phone = document.getElementById('track-phone').value;
            if(!phone) return alert('أدخلي الرقم!');
            const res = await fetch(`/api/my_orders/${phone}`);
            const data = await res.json();
            const list = document.getElementById('past-orders-list');
            
            list.innerHTML = data.length > 0 ? data.map(o => {
                let itemsText = "";
                try {
                    const itemsArray = JSON.parse(o.items);
                    itemsText = itemsArray.map(i => `${i.name} (${i.size})`).join(' - ');
                } catch(e) { itemsText = o.items; }

                return `
                <div style="background:#4D0A11; padding:15px; border-radius:10px; margin-top:10px; border-right:4px solid ${o.status=='تم التأكيد'?'#28a745':'#ffc107'}">
                    <small>${itemsText}</small><br><b>الحالة: ${o.status}</b>
                </div>
                `;
            }).join('') : "لا توجد نتائج.";
        }

        function updateCartCount() { document.getElementById('cart-count').innerText = cart.length; }
        function closeModals() { document.querySelectorAll('.overlay').forEach(o => o.style.display = 'none'); }
        
        async function sendOrder() {
            const name = document.getElementById('c-name').value;
            const phone = document.getElementById('c-phone').value;
            const addr = document.getElementById('c-addr').value;
            if(!name || !phone || !addr) return alert(lang=='ar'?'برجاء إكمال البيانات!':'Please fill all fields!');

            const res = await fetch('/order', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({name, phone, address: addr, items: JSON.stringify(cart)})
            });
            if(res.ok) {
                alert(lang=='ar'?'تم استلام طلبك بنجاح!':'Order received successfully!');
                cart = []; localStorage.removeItem('ridanaa_cart'); location.reload();
            }
        }
        window.onload = init;
    </script>
</body>
</html>
